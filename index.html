#app { max-width: 740px; margin: 0 auto; padding: 0 0 80px; }

/* HEADER */
.header { background: #1c3320; padding: 32px 20px 24px; }
.header-eyebrow { font-size: 10px; letter-spacing: 0.35em; color: #7aaa7a; font-family: monospace; text-transform: uppercase; margin-bottom: 8px; }
.header-title { font-size: clamp(24px, 5vw, 38px); font-weight: 400; color: #f0ede6; line-height: 1.15; }
.header-title em { color: #a8d8a8; }
.header-sub { color: #7aaa7a; font-size: 13px; margin-top: 10px; line-height: 1.5; }

/* PROTEIN TRACKER */
.protein-tracker { background: #243d28; padding: 16px 20px; border-bottom: 1px solid #1a2e1e; }
.tracker-label { font-size: 10px; letter-spacing: 0.25em; color: #7aaa7a; font-family: monospace; text-transform: uppercase; margin-bottom: 10px; }
.tracker-meals { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.meal-btn { padding: 7px 12px; border-radius: 6px; font-size: 12px; border: 2px solid #3a5a3e; color: #a8d8a8; background: transparent; font-family: monospace; display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 80px; }
.meal-btn.logged { background: #2d5a2d; border-color: #5a9a5a; }
.meal-btn-name { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
.meal-btn-protein { font-size: 15px; font-weight: 600; }
.tracker-bar-wrap { display: flex; align-items: center; gap: 12px; }
.tracker-bar-track { flex: 1; height: 8px; background: #1a2e1e; border-radius: 4px; overflow: hidden; }
.tracker-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #4a9a4a, #a8d8a8); transition: width 0.4s ease; }
.tracker-total { font-size: 13px; color: #a8d8a8; font-family: monospace; white-space: nowrap; }
.tracker-goal { font-size: 11px; color: #5a8a5a; font-family: monospace; }
.tracker-reset { font-size: 10px; color: #5a7a5a; font-family: monospace; letter-spacing: 0.1em; padding: 4px 8px; border: 1px solid #3a5a3e; border-radius: 4px; margin-top: 8px; }

/* MAIN CONTENT */
.main { padding: 20px; }

/* INGREDIENTS */
.section-label { font-size: 10px; letter-spacing: 0.25em; color: #4a6a4a; font-family: monospace; text-transform: uppercase; margin: 0 0 10px; font-weight: 600; }
.ingredient-section { margin-bottom: 20px; }
.ingredient-pills { display: flex; flex-wrap: wrap; gap: 7px; }
.pill { padding: 8px 14px; border-radius: 22px; font-size: 13px; border: 2px solid #c8d8c0; background: #fff; color: #3a4a3a; display: flex; align-items: center; gap: 6px; -webkit-tap-highlight-color: transparent; }
.pill.checked { background: #2d5a2d; border-color: #2d5a2d; color: #e8f4e8; }
.pill-icon { font-size: 11px; color: #9ab89a; }
.pill.checked .pill-icon { color: #a8d8a8; }

/* STATUS BAR */
.status-bar { background: #2d5a2d; border-radius: 8px; padding: 14px 18px; margin: 4px 0 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.status-stats { display: flex; gap: 24px; }
.stat-label { font-size: 9px; color: #8ab88a; font-family: monospace; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 2px; }
.stat-value { font-size: 20px; font-family: monospace; color: #e8f4e8; }
.stat-value.orange { color: #f0c878; }
.stat-value.dim { color: #5a8a5a; }
.clear-btn { border: 2px solid #4a8a4a; border-radius: 6px; color: #a8d8a8; font-size: 11px; padding: 6px 12px; font-family: monospace; letter-spacing: 0.1em; }

/* FILTERS */
.filters-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
.filters-row2 { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filter-btn { padding: 7px 13px; border-radius: 6px; font-size: 12px; font-family: monospace; letter-spacing: 0.06em; text-transform: uppercase; border: 2px solid #c8d8c0; color: #4a6a4a; background: #fff; }
.filter-btn.active { background: #1c3320; border-color: #1c3320; color: #e8f4e8; }
.makeable-btn { padding: 7px 13px; border-radius: 6px; font-size: 12px; font-family: monospace; letter-spacing: 0.06em; border: 2px solid #c8d8c0; color: #4a6a4a; background: #fff; }
.makeable-btn.active { background: #2d5a2d; border-color: #2d5a2d; color: #e8f4e8; }
.time-btn { padding: 7px 13px; border-radius: 6px; font-size: 12px; font-family: monospace; letter-spacing: 0.06em; border: 2px solid #c8d8c0; color: #4a6a4a; background: #fff; }
.time-btn.active { background: #5a3a10; border-color: #5a3a10; color: #fde8c8; }

/* RECIPES */
.recipe-list { display: flex; flex-direction: column; gap: 8px; }
.recipe-card { border-radius: 10px; padding: 16px 18px; cursor: pointer; position: relative; overflow: hidden; border: 2px solid #c8d8c0; background: #fff; -webkit-tap-highlight-color: transparent; }
.recipe-card.full-match { background: #f0f8f0; border-color: #2d5a2d; }
.match-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #2d5a2d, #7aba7a); }
.recipe-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.recipe-left { flex: 1; }
.recipe-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; }
.recipe-name { font-size: 15px; color: #7a9a7a; }
.recipe-name.bright { color: #1c2a1c; font-weight: 600; }
.tag { font-size: 9px; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 20px; font-family: monospace; text-transform: uppercase; font-weight: 600; }
.recipe-meta { display: flex; gap: 10px; flex-wrap: wrap; }
.recipe-meta span { font-size: 12px; color: #6a8a6a; font-family: monospace; }
.match-status { color: #b06820 !important; font-weight: 600; }
.match-status.can-make { color: #2d5a2d !important; }
.recipe-kcal { text-align: right; flex-shrink: 0; }
.cal-num { font-size: 19px; font-family: monospace; color: #9ab89a; }
.cal-num.bright { color: #1c3320; font-weight: 600; }
.cal-label { font-size: 9px; color: #9ab89a; font-family: monospace; letter-spacing: 0.1em; }
.recipe-detail { margin-top: 14px; padding-top: 14px; border-top: 2px solid #e0ead8; }
.macro-bars { display: flex; gap: 12px; margin-bottom: 14px; }
.macro-bar { flex: 1; }
.macro-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
.macro-name { font-size: 10px; letter-spacing: 0.12em; color: #4a6a4a; font-family: monospace; text-transform: uppercase; font-weight: 600; }
.macro-val { font-size: 12px; font-family: monospace; font-weight: 600; }
.bar-track { height: 5px; background: #e0ead8; border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; }
.recipe-instructions { font-size: 14px; color: #2a3a2a; line-height: 1.7; margin-bottom: 12px; }
.log-protein-btn { display: inline-block; margin-top: 4px; padding: 8px 16px; background: #2d5a2d; color: #e8f4e8; border-radius: 6px; font-size: 12px; font-family: monospace; letter-spacing: 0.08em; border: none; cursor: pointer; }
.log-protein-btn.logged { background: #7aaa7a; color: #1c2a1c; }

.empty-state { padding: 48px 0; text-align: center; color: #7a9a7a; font-size: 15px; font-style: italic; }
.divider { border: none; border-top: 2px solid #e0d8cc; margin: 24px 0; }

  treat:        {bg:"#ead4f0",color:"#4a1a5a"},
  comfort:      {bg:"#fde0c8",color:"#7a3000"},
  "gym morning":{bg:"#c8e4f8",color:"#0a3050"},
  easy:         {bg:"#e8e8f8",color:"#2a2a6a"},
  fast:         {bg:"#ebebeb",color:"#3a3a3a"},
  light:        {bg:"#d4f0e8",color:"#0a3828"}
};

const MACRO_COLORS = {protein:"#1a5a8a",carbs:"#8a4a10",fat:"#2a6a3a"};

const MEAL_TARGETS = [
  {key:"breakfast",label:"Breakfast",target:30},
  {key:"lunch",label:"Lunch",target:40},
  {key:"dinner",label:"Dinner",target:45},
  {key:"snack",label:"Snacks",target:20},
];

let checked = {}, activeFilter = "all", showMakeableOnly = true, expandedId = null, activeTime = "any";
let loggedProteins = {breakfast:0, lunch:0, dinner:0, snack:0};
let loggedMeals = {};

function init() {
  const container = document.getElementById("ingredients-container");
  for (const [cat, items] of Object.entries(INGREDIENTS)) {
    const sec = document.createElement("div");
    sec.className = "ingredient-section";
    sec.innerHTML = `<div class="section-label">${cat}</div><div class="ingredient-pills" id="pills-${cat}"></div>`;
    container.appendChild(sec);
    const pillsDiv = document.getElementById("pills-" + cat);
    items.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "pill";
      btn.id = "pill-" + item.id;
      btn.innerHTML = `<span class="pill-icon">+</span>${item.label}`;
      btn.onclick = () => toggleIngredient(item.id);
      pillsDiv.appendChild(btn);
    });
  }

  // Build protein tracker buttons
  const mealBtns = document.getElementById("tracker-meals");
  MEAL_TARGETS.forEach(m => {
    const btn = document.createElement("button");
    btn.className = "meal-btn";
    btn.id = "meal-btn-" + m.key;
    btn.innerHTML = `<span class="meal-btn-name">${m.label}</span><span class="meal-btn-protein" id="meal-protein-${m.key}">0g</span>`;
    mealBtns.appendChild(btn);
  });

  renderRecipes();
  updateTracker();
}

function toggleIngredient(id) {
  checked[id] = !checked[id];
  if (!checked[id]) delete checked[id];
  const btn = document.getElementById("pill-" + id);
  const on = !!checked[id];
  btn.className = "pill" + (on ? " checked" : "");
  btn.querySelector(".pill-icon").textContent = on ? "✓" : "+";
  updateStatus();
  renderRecipes();
}

function updateStatus() {
  const ids = Object.keys(checked);
  document.getElementById("checked-count").textContent = ids.length;
  const n = ids.length > 0 ? RECIPES.filter(r => r.required.every(x => checked[x])).length : 0;
  const el = document.getElementById("makeable-count");
  el.textContent = ids.length > 0 ? n : "—";
  el.className = "stat-value " + (ids.length > 0 ? "orange" : "dim");
  document.getElementById("clear-btn").style.display = ids.length > 0 ? "block" : "none";
}

function clearAll() {
  checked = {};
  document.querySelectorAll(".pill").forEach(b => { b.className = "pill"; b.querySelector(".pill-icon").textContent = "+"; });
  updateStatus(); renderRecipes();
}

function setFilter(btn) {
  activeFilter = btn.dataset.filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderRecipes();
}

function toggleMakeable() {
  showMakeableOnly = !showMakeableOnly;
  const btn = document.getElementById("makeable-toggle");
  btn.className = "makeable-btn" + (showMakeableOnly ? " active" : "");
  btn.textContent = showMakeableOnly ? "✓ Makeable Only" : "Show All";
  renderRecipes();
}

function setTime(btn) {
  activeTime = btn.dataset.time;
  document.querySelectorAll(".time-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderRecipes();
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  renderRecipes();
}

function logProtein(recipeId, mealType, protein) {
  const key = `${recipeId}-${mealType}`;
  if (loggedMeals[key]) {
    loggedProteins[mealType.toLowerCase()] = Math.max(0, loggedProteins[mealType.toLowerCase()] - protein);
    delete loggedMeals[key];
  } else {
    loggedProteins[mealType.toLowerCase()] = (loggedProteins[mealType.toLowerCase()] || 0) + protein;
    loggedMeals[key] = true;
  }
  updateTracker();
  renderRecipes();
}

function resetTracker() {
  loggedProteins = {breakfast:0, lunch:0, dinner:0, snack:0};
  loggedMeals = {};
  updateTracker();
  renderRecipes();
}

function updateTracker() {
  const total = Object.values(loggedProteins).reduce((a, b) => a + b, 0);
  const goal = 135;
  const pct = Math.min((total / goal) * 100, 100);
  document.getElementById("tracker-bar").style.width = pct + "%";
  document.getElementById("tracker-total").textContent = total + " / " + goal + "g";
  document.getElementById("tracker-goal").textContent = Math.round(pct) + "% of goal";
  MEAL_TARGETS.forEach(m => {
    const el = document.getElementById("meal-protein-" + m.key);
    const btn = document.getElementById("meal-btn-" + m.key);
    if (el) el.textContent = (loggedProteins[m.key] || 0) + "g";
    if (btn) btn.className = "meal-btn" + (loggedProteins[m.key] > 0 ? " logged" : "");
  });
}

function renderRecipes() {
  const ids = Object.keys(checked);
  const list = document.getElementById("recipe-list");

  const scored = RECIPES.map(r => {
    const req = r.required.filter(x => checked[x]).length;
    const opt = r.optional.filter(x => checked[x]).length;
    return { r, req, opt, canMake: req >= r.required.length };
  }).sort((a, b) => {
    if (b.canMake !== a.canMake) return b.canMake - a.canMake;
    return (b.req + b.opt * 0.3) - (a.req + a.opt * 0.3);
  });

  const filtered = scored.filter(({ r, canMake }) => {
    if (showMakeableOnly && ids.length > 0 && !canMake) return false;
    if (activeFilter !== "all" && !r.meal.toLowerCase().includes(activeFilter)) return false;
    if (activeTime === "5" && r.timeMin > 5) return false;
    if (activeTime === "15" && r.timeMin > 15) return false;
    return true;
  });

  document.getElementById("showing-count").textContent = filtered.length > 0 ? filtered.length : "—";
  document.getElementById("showing-count").className = "stat-value " + (filtered.length > 0 ? "orange" : "dim");

  if (ids.length === 0 && showMakeableOnly) {
    list.innerHTML = `<div class="empty-state">🌿 Check off what's in your fridge to see what you can make.</div>`;
    return;
  }
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">No recipes match those filters. Try adjusting the time or meal filter.</div>`;
    return;
  }

  list.innerHTML = filtered.map(({ r, req, canMake }) => {
    const tag = r.tag && TAG_STYLES[r.tag];
    const exp = expandedId === r.id;
    const mealKey = r.meal.toLowerCase().includes("snack") ? "snack" : r.meal.toLowerCase().includes("breakfast") ? "breakfast" : r.meal.toLowerCase().includes("lunch") ? "lunch" : "dinner";
    const logKey = `${r.id}-${mealKey}`;
    const isLogged = !!loggedMeals[logKey];
    const bar = (name, val, max, color) =>
      `<div class="macro-bar">
        <div class="macro-row">
          <span class="macro-name">${name}</span>
          <span class="macro-val" style="color:${color}">${val}g</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(val/max*100,100)}%;background:${color}"></div></div>
      </div>`;
    return `
      <div class="recipe-card${canMake ? ' full-match' : ''}" onclick="toggleExpand(${r.id})">
        ${canMake ? '<div class="match-bar"></div>' : ''}
        <div class="recipe-top">
          <div class="recipe-left">
            <div class="recipe-name-row">
              <span class="recipe-name${canMake ? ' bright' : ''}">${r.name}</span>
              ${tag ? `<span class="tag" style="background:${tag.bg};color:${tag.color}">${r.tag}</span>` : ''}
            </div>
            <div class="recipe-meta">
              <span>${r.meal}</span>
              <span>⏱ ${r.timeMin} min</span>
              <span class="match-status${canMake ? ' can-make' : ''}">${canMake ? '✓ can make this' : `${req}/${r.required.length} required`}</span>
            </div>
          </div>
          <div class="recipe-kcal">
            <div class="cal-num${canMake ? ' bright' : ''}">${r.macros.cal}</div>
            <div class="cal-label">kcal</div>
          </div>
        </div>
        ${exp ? `
          <div class="recipe-detail">
            <div class="macro-bars">
              ${bar('Protein', r.macros.protein, 60, MACRO_COLORS.protein)}
              ${bar('Carbs', r.macros.carbs, 70, MACRO_COLORS.carbs)}
              ${bar('Fat', r.macros.fat, 30, MACRO_COLORS.fat)}
            </div>
            <p class="recipe-instructions">${r.instructions}</p>
            <button class="log-protein-btn${isLogged ? ' logged' : ''}" onclick="event.stopPropagation(); logProtein(${r.id}, '${mealKey}', ${r.macros.protein})">
              ${isLogged ? '✓ Logged ' + r.macros.protein + 'g protein' : '+ Log ' + r.macros.protein + 'g protein'}
            </button>
          </div>` : ''}
      </div>`;
  }).join('');
}

init();
</script>

</body>
</html>
