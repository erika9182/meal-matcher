const TAG_STYLES = {

const MACRO_COLORS = { protein: “#80c8f0”, carbs: “#f0b070”, fat: “#90d490” };

function MacroBar({ label, value, max, color }) {
return (
<div style={{ flex: 1 }}>
<div style={{ display: “flex”, justifyContent: “space-between”, marginBottom: 4 }}>
<span style={{ fontSize: 9, letterSpacing: “0.15em”, color: “#aaa”, fontFamily: “monospace”, textTransform: “uppercase” }}>{label}</span>
<span style={{ fontSize: 11, color, fontFamily: “monospace” }}>{value}g</span>
</div>
<div style={{ height: 3, background: “#222”, borderRadius: 2, overflow: “hidden” }}>
<div style={{ height: “100%”, width: `${Math.min((value / max) * 100, 100)}%`, background: color, borderRadius: 2 }} />
</div>
</div>
);
}

function RecipeCard({ recipe, matchScore }) {
const [expanded, setExpanded] = React.useState(false);
const isFullMatch = matchScore >= recipe.required.length;
const tag = recipe.tag ? TAG_STYLES[recipe.tag] : null;

return (
<div onClick={() => setExpanded(!expanded)} style={{ background: isFullMatch ? “#1a2018” : “#141414”, border: `1px solid ${isFullMatch ? "#3a5a34" : "#222"}`, borderRadius: 4, padding: “16px 18px”, cursor: “pointer”, position: “relative”, overflow: “hidden” }}>
{isFullMatch && <div style={{ position: “absolute”, top: 0, left: 0, right: 0, height: 2, background: “linear-gradient(90deg, #90d490, #80c8f0)” }} />}
<div style={{ display: “flex”, justifyContent: “space-between”, alignItems: “flex-start”, gap: 12 }}>
<div style={{ flex: 1 }}>
<div style={{ display: “flex”, alignItems: “center”, gap: 8, flexWrap: “wrap”, marginBottom: 4 }}>
<span style={{ fontSize: 15, color: isFullMatch ? “#e8e2d5” : “#999” }}>{recipe.name}</span>
{tag && <span style={{ fontSize: 9, letterSpacing: “0.15em”, background: tag.bg, color: tag.color, padding: “2px 7px”, borderRadius: 20, fontFamily: “monospace”, textTransform: “uppercase” }}>{tag.label}</span>}
</div>
<div style={{ display: “flex”, gap: 12, flexWrap: “wrap” }}>
<span style={{ fontSize: 11, color: “#aaa”, fontFamily: “monospace” }}>{recipe.meal}</span>
<span style={{ fontSize: 11, color: “#aaa”, fontFamily: “monospace” }}>⏱ {recipe.time}</span>
<span style={{ fontSize: 11, color: isFullMatch ? “#90d490” : “#f0b070”, fontFamily: “monospace” }}>
{isFullMatch ? “✓ can make this” : `${matchScore}/${recipe.required.length} required`}
</span>
</div>
</div>
<div style={{ textAlign: “right”, flexShrink: 0 }}>
<div style={{ fontSize: 18, color: isFullMatch ? “#e8e2d5” : “#666”, fontFamily: “monospace” }}>{recipe.macros.cal}</div>
<div style={{ fontSize: 9, color: “#888”, fontFamily: “monospace”, letterSpacing: “0.1em” }}>KCAL</div>
</div>
</div>
{expanded && (
<div style={{ marginTop: 16, paddingTop: 16, borderTop: “1px solid #222” }}>
<div style={{ display: “flex”, gap: 12, marginBottom: 14 }}>
<MacroBar label="Protein" value={recipe.macros.protein} max={60} color={MACRO_COLORS.protein} />
<MacroBar label="Carbs" value={recipe.macros.carbs} max={70} color={MACRO_COLORS.carbs} />
<MacroBar label="Fat" value={recipe.macros.fat} max={30} color={MACRO_COLORS.fat} />
</div>
<p style={{ fontSize: 13, color: “#c8bea8”, margin: 0, lineHeight: 1.65, fontStyle: “italic” }}>{recipe.instructions}</p>
</div>
)}
</div>
);
}

function App() {
const [checked, setChecked] = React.useState({});
const [filter, setFilter] = React.useState(“all”);
const [showOnly, setShowOnly] = React.useState(“makeable”);

const toggle = (id) => setChecked(prev => ({ …prev, [id]: !prev[id] }));
const checkedIds = Object.keys(checked).filter(k => checked[k]);

const scored = RECIPES.map(recipe => {
const requiredMatches = recipe.required.filter(r => checkedIds.includes(r)).length;
const optionalMatches = recipe.optional.filter(r => checkedIds.includes(r)).length;
return { recipe, matchScore: requiredMatches, optionalMatches, canMake: requiredMatches >= recipe.required.length };
}).sort((a, b) => {
if (b.canMake !== a.canMake) return b.canMake - a.canMake;
return (b.matchScore + b.optionalMatches * 0.3) - (a.matchScore + a.optionalMatches * 0.3);
});

const filtered = scored.filter(({ recipe, canMake }) => {
if (showOnly === “makeable” && checkedIds.length > 0 && !canMake) return false;
if (filter === “all”) return true;
return recipe.meal.toLowerCase().includes(filter);
});

const makeableCount = scored.filter(s => s.canMake).length;

return (
<div style={{ minHeight: “100vh”, background: “#0d0d0d”, color: “#e8e2d5” }}>
<div style={{ padding: “36px 24px 24px”, borderBottom: “1px solid #1e1e1e” }}>
<div style={{ maxWidth: 720, margin: “0 auto” }}>
<p style={{ fontSize: 10, letterSpacing: “0.35em”, color: “#888”, fontFamily: “monospace”, margin: “0 0 8px”, textTransform: “uppercase” }}>Meal Matcher</p>
<h1 style={{ fontSize: “clamp(22px, 4vw, 36px)”, fontWeight: 400, color: “#f0ebe0”, margin: “0 0 6px”, lineHeight: 1.1 }}>
Check what you have.<br />
<em style={{ color: “#90d490” }}>Find out what to make.</em>
</h1>
<p style={{ color: “#888”, fontSize: 12, margin: “10px 0 0”, lineHeight: 1.5 }}>Tap your ingredients, get matched recipes with macros instantly.</p>
</div>
</div>
